<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIBP - AI Blog Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: rgba(255,255,255,0.08);
    --text: #e8e8f0;
    --text2: #8888aa;
    --accent: #7c6ff7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --naver: #03c75a;
    --google-blue: #4285F4;
    --affiliate: #f7971e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  /* AUTH SCREEN */
  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,111,247,0.15) 0%, transparent 70%);
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 40px; width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo h1 { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .auth-logo h1 span { color: var(--accent2); }
  .auth-logo p { color: var(--text2); font-size: 13px; margin-top: 6px; }
  .auth-tabs { display: flex; gap: 0; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; padding: 8px; background: none; border: none; color: var(--text2); cursor: pointer; border-radius: 9px; font-size: 14px; font-weight: 600; font-family: 'Noto Sans KR'; transition: all .2s; }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: 'Noto Sans KR'; outline: none; transition: border-color .2s; }
  .form-group input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), #a78bfa); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR'; cursor: pointer; transition: opacity .2s; margin-top: 4px; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .auth-msg.error { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .auth-msg.success { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

  /* APP SHELL */
  #app-screen { display: none; min-height: 100vh; }
  
  /* SIDEBAR */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100; transition: transform .3s;
  }
  .sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .sidebar-logo h2 { font-family: 'Space Grotesk'; font-size: 18px; color: var(--accent2); }
  .sidebar-logo p { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
  .nav-section { margin-bottom: 20px; }
  .nav-section-title { font-size: 10px; color: var(--text2); font-weight: 700; padding: 0 12px; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .nav-item.active { background: rgba(124,111,247,0.15); color: var(--accent2); }
  .nav-item .icon { font-size: 16px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 700; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; background: var(--surface2); }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .user-details { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-role { font-size: 11px; color: var(--text2); }
  .btn-logout { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 4px; }

  /* MAIN CONTENT */
  .main { margin-left: 240px; min-height: 100vh; }
  .main-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .main-header h1 { font-size: 18px; font-weight: 700; }
  .main-content { padding: 28px; }
  
  /* PAGE SECTIONS */
  .page { display: none; }
  .page.active { display: block; }

  /* TOOL CARDS */
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .tool-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
  .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,111,247,0.15); }
  .tool-card-icon { font-size: 28px; margin-bottom: 12px; }
  .tool-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .tool-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .tool-card-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 3px 8px; border-radius: 6px; font-weight: 700; }
  .tool-card-affiliate { border-color: rgba(247,151,30,0.2); }
  .tool-card-affiliate:hover { border-color: #f7971e; box-shadow: 0 8px 32px rgba(247,151,30,0.15); }
  .tool-card-naver { border-color: rgba(3,199,90,0.2); }
  .tool-card-naver:hover { border-color: var(--naver); box-shadow: 0 8px 32px rgba(3,199,90,0.15); }
  .tool-card-google { border-color: rgba(66,133,244,0.2); }
  .tool-card-google:hover { border-color: var(--google-blue); box-shadow: 0 8px 32px rgba(66,133,244,0.15); }

  /* FORM STYLES */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
  .form-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; color: var(--text2); font-weight: 600; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--border); border-radius: 10px; color: var(--text);
    font-size: 14px; font-family: 'Noto Sans KR'; outline: none; transition: border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: #1a1a28; }

  /* BUTTONS */
  .btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR'; border: none; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; }
  .btn-gen { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; width: 100%; justify-content: center; padding: 13px; font-size: 15px; margin-top: 20px; }
  .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-copy { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--border); }
  .btn-copy:hover { background: rgba(255,255,255,0.12); }
  .btn-schema { background: rgba(124,111,247,0.15); color: var(--accent2); border: 1px solid rgba(124,111,247,0.3); }
  .btn-img { background: rgba(251,191,36,0.15); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
  .btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

  /* RESULT AREA */
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .result-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: rgba(124,111,247,0.08); border-bottom: 1px solid var(--border); }
  .result-title { font-size: 13px; font-weight: 700; color: var(--accent2); }
  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .result-body { padding: 20px; max-height: 560px; overflow-y: auto; }
  .result-text { white-space: pre-wrap; word-break: break-word; font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.85); }
  
  /* SCHEMA PANEL */
  .schema-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-top: 16px; }
  .schema-panel h4 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--accent2); }
  .schema-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .schema-chip { padding: 6px 12px; border-radius: 8px; background: rgba(124,111,247,0.1); border: 1px solid rgba(124,111,247,0.25); color: var(--accent2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .schema-chip.active { background: rgba(124,111,247,0.25); border-color: var(--accent); }
  .schema-output { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: #a0f0a0; overflow-x: auto; max-height: 200px; overflow-y: auto; display: none; white-space: pre; }
  .schema-output.show { display: block; }

  /* IMAGE PREVIEW */
  .image-preview { margin-top: 16px; border-radius: 12px; overflow: hidden; display: none; }
  .image-preview img { width: 100%; display: block; }
  .image-preview.show { display: block; }

  /* LOADING */
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; display: none; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text); font-size: 14px; }

  /* PROGRESS BAR */
  .progress-bar { background: rgba(255,255,255,0.05); border-radius: 99px; height: 6px; overflow: hidden; margin-top: 12px; display: none; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  /* ADMIN */
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-num { font-size: 32px; font-weight: 700; font-family: 'Space Grotesk'; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 16px; background: var(--surface2); font-size: 12px; color: var(--text2); font-weight: 600; text-align: left; }
  td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--border); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .badge-admin { background: rgba(124,111,247,0.2); color: var(--accent2); }
  .badge-user { background: rgba(136,136,170,0.15); color: var(--text2); }
  .badge-active { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-inactive { background: rgba(248,113,113,0.15); color: var(--red); }

  /* SETTINGS */
  .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  .settings-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .tip-box { background: rgba(124,111,247,0.08); border: 1px solid rgba(124,111,247,0.2); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: var(--text2); margin-top: 12px; }
  .tip-box strong { color: var(--accent2); }

  /* NOTIFICATION */
  .notif { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 9999; transform: translateY(100px); opacity: 0; transition: all .3s; max-width: 360px; }
  .notif.show { transform: translateY(0); opacity: 1; }
  .notif-success { background: rgba(52,211,153,0.15); border: 1px solid var(--green); color: var(--green); }
  .notif-error { background: rgba(248,113,113,0.1); border: 1px solid var(--red); color: var(--red); }
  .notif-info { background: rgba(124,111,247,0.15); border: 1px solid var(--accent); color: var(--accent2); }

  /* HISTORY */
  .post-list { display: grid; gap: 12px; }
  .post-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 14px; }
  .post-type-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .post-info { flex: 1; min-width: 0; }
  .post-keyword { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .post-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
  
  /* MOBILE */
  .menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .menu-toggle { display: block; }
    .form-grid, .settings-grid { grid-template-columns: 1fr; }
    .tool-grid { grid-template-columns: 1fr; }
    .admin-grid { grid-template-columns: 1fr 1fr; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; display: none; }
    .sidebar-overlay.show { display: block; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🤖 AI<span>BP</span></h1>
      <p>AI Blog Platform · 블로그 자동 생성 솔루션</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">로그인</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">회원가입</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="admin@aibp.local" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="login-password" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()" id="login-btn">로그인</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="reg-name" placeholder="이름을 입력하세요">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="reg-email" placeholder="이메일을 입력하세요">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="reg-password" placeholder="6자 이상 입력하세요">
      </div>
      <button class="btn-primary" onclick="doRegister()" id="reg-btn">회원가입</button>
    </div>

    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- APP SCREEN -->
<div id="app-screen">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h2>🤖 AIBP</h2>
      <p id="sidebar-role-text">AI Blog Platform</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">글 생성 도구</div>
        <button class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard">
          <span class="icon">🏠</span> 대시보드
        </button>
        <button class="nav-item" onclick="showPage('affiliate')" data-page="affiliate">
          <span class="icon">💰</span> 제휴 마케팅 블로그
        </button>
        <button class="nav-item" onclick="showPage('naver_seo')" data-page="naver_seo">
          <span class="icon">🟢</span> 네이버 SEO 최적화
        </button>
        <button class="nav-item" onclick="showPage('google_seo')" data-page="google_seo">
          <span class="icon">🔵</span> 구글 SEO 최적화
        </button>
        <button class="nav-item" onclick="showPage('policy')" data-page="policy">
          <span class="icon">🏛️</span> 정책·지원금 안내
        </button>
        <button class="nav-item" onclick="showPage('referral')" data-page="referral">
          <span class="icon">🔗</span> 추천인 유도 블로그
        </button>
        <button class="nav-item" onclick="showPage('adsense')" data-page="adsense">
          <span class="icon">💎</span> 애드센스 승인 특화
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">관리</div>
        <button class="nav-item" onclick="showPage('history')" data-page="history">
          <span class="icon">📋</span> 생성 기록
        </button>
        <button class="nav-item" onclick="showPage('settings')" data-page="settings">
          <span class="icon">⚙️</span> 설정
        </button>
        <button class="nav-item admin-only" onclick="showPage('admin')" data-page="admin" style="display:none">
          <span class="icon">🛡️</span> 관리자
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">U</div>
        <div class="user-details">
          <div class="user-name" id="user-name">사용자</div>
          <div class="user-role" id="user-role">user</div>
        </div>
        <button class="btn-logout" onclick="doLogout()" title="로그아웃">⬅️</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h1 id="page-title">대시보드</h1>
      </div>
      <div id="header-actions"></div>
    </div>
    <div class="main-content" id="main-content">
      <!-- Pages rendered here by JS -->
    </div>
  </main>
</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">처리 중...</div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<script src="/js/app.js"></script>
</body>
</html>
